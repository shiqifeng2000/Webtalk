<body>
  <!-- Browser base64 Session Description<br />
    <textarea id="localSessionDescription" readonly="true"></textarea> <br />

    Golang base64 Session Description<br />
    <textarea id="remoteSessionDescription"> </textarea> <br />
    <button onclick="window.startSession()">Start Session</button><br />

    <br /> -->

  <!-- <video id="remoteVideos" autoplay muted controls style="width: 100%; height: 50%px"></video> -->
  <section class="section">
    <video id="localVideo" autoplay controls muted></video>
  </section>
</body>
<script>
  let start_time = Date.now();
  const localVideo = document.getElementById('localVideo');
  let runner = async () => {
    try {
      await getVideoAudioTrack();
    } catch (e) {
      await getVideoTrack();
    }
  }

  async function getVideoAudioTrack() {
    let localStream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video:
      {
        width: { exact: 1920, },
        height: { exact: 1080, },
        aspectRatio: {
          exact: 960 / 540
        },
        // resizeMode: false,
        // zoom: false,
        facingMode: "user",
        frameRate: { exact: 20 }
      }
    });
    localVideo.srcObject = localStream;
  }
  async function getVideoTrack() {
    let videoStream = await navigator.mediaDevices.getUserMedia({
      video:
      {
        width: { exact: 1920, },
        height: { exact: 1080, },
        aspectRatio: {
          exact: 960 / 540
        },
        // resizeMode: false,
        // zoom: false,
        facingMode: "user",
        frameRate: { exact: 20 }
      }
    });
    localVideo.srcObject = videoStream;
  }
  async function getAudioTrack(pc) {
    let audioStream = await navigator.mediaDevices.getUserMedia({
      audio: true
    });
  }
  runner();
</script>

</html>
