# # Scan this file for changes every 30 seconds
refresh_rate: 30 seconds

appenders:
  # An appender named "stdout" that writes to stdout
  stdout:
    kind: console
    encoder:
      pattern: "[Console] {d} - {l} -{t} - {m}{n}"

  debug:
    kind: rolling_file
    path: log/debug.log
    encoder:
      pattern: "[debug] {d} - {l} - {t} - {m}{n}"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 100mb
      roller:
        kind: fixed_window
        pattern: "log/compressed-debug-log-{}-.log"
        base: 0
        count: 30
  rolling:
    kind: rolling_file
    path: log/app.log
    encoder:
      pattern: "[Rolling] {d} - {l} - {t} - {m}{n}"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 100mb
      roller:
        kind: fixed_window
        pattern: "log/compressed-app-log-{}-.log"
        base: 0
        count: 30

# Set the default logging level to "warn" and attach the "stdout" appender to the root
root:
  level: info
  appenders:
    - rolling
    - stdout

loggers:
  # Route log events sent to the "app" logger to the "file" appender,
  # and *not* the normal appenders installed at the root
  app:
    level: debug
    appenders:
      - rolling
    additive: false
  debug:
    level: debug
    appenders:
      - debug
    additive: false
    

